<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>투자 시뮬레이터 v3.1 | 완벽한 반응형 & 인터액티브</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <style>
        :root {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --primary: #10b981;
            --secondary: #3b82f6;
            --accent: #f59e0b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            overflow-x: hidden;
            width: 100%;
        }

        header {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
            text-align: center;
        }
        header h1 { font-size: 1.1rem; color: var(--primary); font-weight: 800; letter-spacing: 0.05em; }

        main {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        section { margin-bottom: 60px; }

        .section-title { margin-bottom: 25px; }
        .section-title h2 { font-size: 1.6rem; font-weight: 800; margin-bottom: 5px; color: var(--text-main); }
        .section-title p { color: var(--text-muted); font-size: 0.95rem; }

        /* 대시보드 구조 (모바일: 세로 / PC: 가로) */
        .dashboard {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        @media (min-width: 1024px) {
            .dashboard {
                display: grid;
                grid-template-columns: 400px 1fr;
                align-items: stretch;
            }
        }

        /* 카드 UI */
        .card {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 25px;
            border: 1px solid var(--border);
            width: 100%;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .controls { display: flex; flex-direction: column; gap: 25px; }
        .control-item { display: flex; flex-direction: column; gap: 12px; }
        .label-row { display: flex; justify-content: space-between; align-items: center; }
        .label-text { font-size: 0.95rem; font-weight: 600; color: var(--text-muted); }
        .label-value { font-family: 'JetBrains Mono', monospace; font-size: 1.2rem; font-weight: 700; color: var(--primary); }

        /* 슬라이더 스타일 */
        input[type=range] {
            width: 100%; height: 8px; background: #334155; border-radius: 10px;
            appearance: none; cursor: pointer;
        }
        input[type=range]::-webkit-slider-thumb {
            appearance: none; width: 24px; height: 24px; background: var(--primary);
            border-radius: 50%; border: 3px solid #fff; box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        /* 요약 지표 */
        .stat-card {
            background: rgba(16, 185, 129, 0.08);
            border: 1px solid rgba(16, 185, 129, 0.2);
            padding: 20px;
            border-radius: 18px;
            margin-top: 10px;
        }
        .stat-label { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 6px; font-weight: 600; }
        .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 1.8rem; font-weight: 800; color: var(--text-main); line-height: 1.2; }

        /* 차트 영역 */
        .chart-area {
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        @media (min-width: 1024px) {
            .chart-area { min-height: 500px; padding: 30px; }
        }
        .chart-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            min-height: 300px;
        }

        footer { text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 0.85rem; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

    <header>
        <h1>INVESTMENT SIMULATOR LAB</h1>
    </header>

    <main>
        <section>
            <div class="section-title">
                <h2>01
