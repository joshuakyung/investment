<!DOCTYPE html>
<html lang="ko">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

        :root {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --primary: #10b981;
            --secondary: #3b82f6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            overflow-x: hidden;
            width: 100%;
        }

        /* 최상단 헤더(Hero) */
        .hero-banner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 20px 40px;
            text-align: left;
        }
        .hero-banner h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 24px;
            letter-spacing: -0.02em;
        }
        .hero-banner h1 span { color: var(--primary); }
        .hero-banner p {
            font-size: clamp(1rem, 3vw, 1.25rem);
            color: var(--text-muted);
            line-height: 1.6;
            max-width: 700px;
            word-break: keep-all;
        }

        main { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        section { margin-bottom: 80px; width: 100%; }
        
        .section-header {
            margin-bottom: 25px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }
        .section-header h2 { font-size: 1.6rem; font-weight: 700; color: var(--text-main); }

        .dashboard { display: flex; flex-direction: column; gap: 20px; width: 100%; }
        @media (min-width: 1024px) {
            .dashboard { display: grid; grid-template-columns: 400px 1fr; align-items: stretch; }
        }

            background: var(--bg-card);
            border-radius: 24px;
            padding: 30px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .control-item { margin-bottom: 20px; display: flex; flex-direction: column; gap: 12px; }
        .label-row { display: flex; justify-content: space-between; align-items: center; }
